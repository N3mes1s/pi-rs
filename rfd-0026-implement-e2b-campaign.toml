[[milestones]]
id = "e2b-live-integration-test"
branch = "rfd-0026-impl-e2b-live-test"
implementer = "halo-implementer"
reviewer = "gpt5-code-reviewer"
fix_loop_max = 10

assignment = """
M1 landed the API client + module + wiring. This milestone adds
a SINGLE integration test that exercises the live E2B API and
proves the SandboxProvider trait actually works against a real
remote sandbox. No mock; this is the "does it actually work"
gate.

## Test file

`crates/pi-sandbox/tests/remote_e2b_smoke.rs`. Linux-only
(`#![cfg(target_os = "linux")]` matches every other
firecracker_*/microvm_* test in that directory).

## Skip-cleanly contract

Test gates on `E2B_API_KEY` being set. When unset:
print `SKIP: E2B_API_KEY not set` and return Ok. This means
`cargo test -p pi-sandbox` passes on hosts without the key —
critical for CI hygiene.

## What the test asserts

  1. Construct `E2bProvider::from_env()` (or whatever
     M1's API is). No `panic!` on construction.
  2. Build a `ToolContext` with cwd = a tempdir.
  3. Stage one file in the tempdir: `host_seed.txt` with
     contents `"e2b-roundtrip-marker"`.
  4. Call `provider.execute_tool(&ctx, "bash",
     json!({"command": "ls /work && cat /work/host_seed.txt"}))`.
  5. Assert exit_status == 0, stdout contains
     `"e2b-roundtrip-marker"`. (Whether E2B's
     `/work` mount works the same way as local microVM is part
     of what this test PROVES — if the RFD says yes, this
     assertion exercises that. If the RFD says E2B sandboxes
     get host_cwd via a different mechanism — say a tarball
     upload at acquire time — adapt the assertion to whatever
     the RFD pins.)
  6. Call `provider.release()`. No panic.

## Hard constraints

- One test, one assertion path. NOT a matrix of tests — that's
  premature breadth for v1.
- The test's wall-time should be < 30s on a warm E2B account.
  If it goes over, something is wrong; fail loudly.
- Use `cost_usd` field on the returned `VmExecution` in a
  side-`eprintln!` so operators can see what one round-trip
  costs. (Don't assert on it — vendor pricing changes.)

Acceptance: `cargo test -p pi-sandbox --test remote_e2b_smoke`
passes against a real E2B account when the env key is present,
and skips cleanly when it isn't.
"""

