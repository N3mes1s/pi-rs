# RFD 0026 — implement the E2B remote sandbox provider end-to-end.
#
# Sequel to rfd-0026-finalize-campaign.toml: that one drove the
# stub RFD to a pinned design. This one writes the code, lands a
# working E2B-backed `SandboxProvider`, and proves it with a real
# session against E2B's live API. No more vapor.
#
# Prereqs (host-side; campaign verifies + fails loudly if absent):
#   - RFD 0026 has reached `Status: READY` (rfd-0026-finalize-iter
#     branch merged or close to it). The implementation must
#     follow the design pinned there.
#   - E2B API key set as `E2B_API_KEY` env var OR stored under
#     pi's AuthStorage. Without one the integration test skips
#     gracefully but the dogfood milestone fails.
#   - Network access from the host to api.e2b.dev (the campaign
#     does NOT exercise pi-rs's NetworkPolicy::Allow path; the
#     E2B provider is a *host-side* network client, not a
#     guest-side one).
#
# Run:
#   pi --orchestrate rfd-0026-implement-e2b-campaign.toml \
#      --auto-approve auto-judge --route auto

name = "rfd-0026-implement-e2b"
description = """
Land a working E2B-backed `SandboxProvider` impl in
`crates/pi-sandbox/src/remote/e2b.rs`, wire it into the
`--sandbox-provider=remote:e2b` flag, and prove it with two
artifacts: (a) an integration test that boots a real E2B
sandbox + runs a bash command + asserts the output, and (b) a
real dogfood — pi running with `--sandbox-provider=remote:e2b`
solving a small coding task against a host-staged source tree.
"""

target_branch = "rfd-0026-implement-e2b-target"

[defaults]
fix_loop_max = 15
push_retry_max = 0
reviewer = "gpt5-code-reviewer"

# ─────────────────────────────────────────────────────────────────
# M1 — Read the RFD; design the module shape; implement the API client.
# ─────────────────────────────────────────────────────────────────
[[milestones]]
id = "e2b-api-client"
branch = "rfd-0026-impl-e2b-client"
implementer = "halo-implementer"
reviewer = "gpt5-code-reviewer"
fix_loop_max = 12

assignment = """
You are implementing the E2B remote sandbox provider for pi-rs.
Pinned design lives in `rfd/0026-sandbox-remote.md` (READY-or-
close-to-it status; halo wrote the substance via the
rfd-0026-finalize campaign). Read that RFD end-to-end FIRST.
Don't deviate from it without justification.

## What this milestone ships

A new module hierarchy `crates/pi-sandbox/src/remote/` with:

  - `mod.rs` — `pub mod e2b;` plus a `RemoteBackend` enum (or
    similar) if the RFD specifies a shared abstraction across
    vendors. Otherwise this is one-line `pub mod e2b;`.
  - `e2b.rs` — the heart of the work:
    * `pub struct E2bConfig` carrying api_key, base_url
      (default `https://api.e2b.dev`), default template id,
      default sandbox timeout, and any RFD-pinned knobs.
    * `pub struct E2bProvider` impl'ing `SandboxProvider`. The
      `execute_tool` arm dispatches via the E2B sandbox's
      shell-exec API (or whatever the RFD pins as the wire
      shape — likely "ship pi-sandbox-worker into the
      sandbox and dispatch tool calls over its existing
      vsock-protocol-equivalent").
    * `async fn create_sandbox(&self) -> Result<SandboxHandle>`
      and `release(handle)` matching the lifecycle the SDK
      provides. Use `reqwest` (already in workspace deps) for
      the HTTP layer.
    * Auth resolution: `E2B_API_KEY` env (tightest) →
      `AuthStorage::get("e2b")` (per RFD 0027 pattern) →
      typed error.
    * Telemetry: `cost_usd` per RFD 0026's spec (E2B exposes
      per-second compute cost; flow it into the
      `SandboxAction` row).

  - `crates/pi-sandbox/Cargo.toml` gains:
      reqwest = { workspace = true, features = ["json"] }
      (or the matching feature set; check workspace pin first
      before assuming).

## Wiring into the pi binary

`crates/pi-coding-agent/src/startup.rs::install_sandbox_from_flag`
already supports `local-process` and `microvm:firecracker`. Add
a `"remote:e2b"` arm that constructs `E2bProvider` from
`E2bConfig::from_env()` (which itself reads `E2B_API_KEY` etc.)
and assigns it as `cfg.sandbox_provider`. Mirror the env-resolution
posture used by `microvm:firecracker` (errors at first acquire,
not at construction).

`crates/pi-coding-agent/src/cli.rs`'s `--sandbox-provider` doc
comment gets a third bullet for `remote:e2b` describing the env
var requirement.

## Tests this milestone owns

Three unit tests in `crates/pi-sandbox/src/remote/e2b.rs`'s
`#[cfg(test)] mod tests`:

  1. `e2b_config_from_env_picks_up_api_key` — sets E2B_API_KEY,
     constructs E2bConfig, asserts the key landed.
  2. `e2b_config_from_env_errors_when_no_key` — unsets the env
     var (use `std::env::remove_var` carefully — be aware of
     thread-local issues), constructs E2bConfig, asserts the
     specific typed error variant.
  3. `e2b_provider_construction_is_lazy` — building the provider
     does NOT make an HTTP call. Covered by a counter or by
     wiremock on the configured base_url; if construction
     accidentally hits the network the test fails.

(NO real-network test in this milestone — that lands in M3.)

## Constraints

- Cite real, current files for every reference. Verify with
  `find` / `grep` before each commit.
- Don't add a new dependency unless the RFD pins it. `reqwest`
  is already in workspace; serde_json + tokio are baseline.
- Don't reinvent. The `SandboxProvider` trait + `ToolContext`
  + `VmExecution` already exist; reuse them.
- Match the LocalProcessProvider posture for error
  classification (which `SandboxError` variants signal what).
- Keep the module compileable on every commit. The reviewer
  will `cargo check -p pi-sandbox` and reject any iter that
  doesn't compile.

Acceptance: reviewer's verdict line is `Verdict: APPROVED`
(or whatever the gpt5-code-reviewer convention is) AND
`cargo build -p pi-sandbox -p pi-coding-agent` is clean.
"""

