fix_loop_max = 8

assignment = """
M1 + M2 prove the wire shape works mechanically. This milestone
runs a real coding task through `--sandbox-provider=remote:e2b`
end-to-end — same dogfood pattern that closed RFD 0023 Commit
G's loop with the local microVM provider.

## What ships

A scripted reproducible demo (NOT a permanent integration
test — too vendor-coupled and too slow for CI) at
`scripts/dogfood-e2b-remote-sandbox.sh` that:

  1. Stages a small toy source tree under a tempdir
     (e.g. a single .rs file with a buggy line + an empty
     `tests/` dir).
  2. Runs `pi -p --sandbox-provider=remote:e2b
     --auto-approve yolo` with a self-contained brief
     ("read the file, identify the bug, write a test that
     would catch it"). Captures stdout to a side log.
  3. Verifies (host-side) that:
       - The agent's bash tool calls landed inside the E2B
         sandbox (not on the host) — check with a sentinel
         like `hostname` reporting the sandbox's id.
       - The new test file showed up in the host tempdir
         (proving the host_cwd → remote sandbox file sync
         worked in BOTH directions).
       - `pi sandbox doctor` reports the e2b binary / config
         resolution correctly.

## Documentation

Add a one-paragraph section to RFD 0026's "Operating notes"
linking to the dogfood script + the v1 integration test, and
record the wall-time + approximate cost the script measured
(`E2B took N seconds, ~$0.0X per round-trip` based on M2's
eprintln). This closes the documentation loop.

## Hard constraints

- The script must NOT commit the demo's tempdir to the repo.
  It's a side-effect-free repro, not a fixture.
- It must skip cleanly if E2B_API_KEY is unset (print a clear
  manual-setup pointer and exit 0).
- It must NOT tear down the user's existing E2B sandboxes —
  scope its sandbox creates to its own short-lived ones, with
  kill-on-exit cleanup.

Acceptance: the script runs end-to-end on a host with
E2B_API_KEY set, prints the expected before/after diff, exits
0; AND the gpt5-code-reviewer finds no critical issues with
the script + RFD update.
"""
