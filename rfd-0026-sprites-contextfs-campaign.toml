assignment = """
You are extending the SpritesProvider in pi-rs to spawn the
host-side contextfs + agora daemons that the sprite will tunnel
back through.

Read FIRST:
  - rfd/0026-sandbox-remote.md (especially the §"v2 — contextfs-
    backed /work for remote sandboxes" section, Architecture +
    Phase A/B/C work plan)
  - crates/pi-sandbox/src/microvm/contextfs_proxy.rs (existing
    `spawn_cfs_fs_server` + `spawn_cfs_vsock_bridge` pattern;
    you'll reuse spawn_cfs_fs_server, replace vsock_bridge with
    cfs-mesh agora-bridge)
  - crates/pi-sandbox/src/microvm/broker_proxy.rs (existing
    `spawn_contextfs_broker` + Cedar policy file generation)
  - crates/pi-sandbox/src/remote/sprites.rs (the skeleton you're
    extending; commit 9ed9e45 on main)
  - contextfs/crates/contextfs-mesh/src/main.rs::AgoraBridge
    + AgoraListen (the cfs-mesh subcommands you'll spawn)
  - agora's CLI for joining a room with a key (look at
    /home/nemesis/code/agora/README.md for the `agora dm` /
    `agora accept` flow OR a programmatic API if available)

## What this milestone ships

Extend `crates/pi-sandbox/src/remote/sprites.rs` to spawn three
host-side child processes during `ensure_session_open`:

  1. `cfs-fs-server --root <ctx.cwd> --socket <run_dir>/cfs-fs.sock`
     (RW; the broker is the policy gate)
  2. `contextfs-broker run --socket <run_dir>/broker.sock
                            --policy <run_dir>/cedar.policy
                            --tenant-secret-path <run_dir>/tenant.secret
                            --allowed-uid <self_uid>`
  3. `cfs-mesh agora-bridge --room <room_id_X>
                            --target-uds <run_dir>/cfs-fs.sock`
     and a sibling for the broker UDS on a separate room Y.

REUSE the existing `spawn_cfs_fs_server` + `spawn_contextfs_broker`
helpers from `microvm/{contextfs_proxy,broker_proxy}.rs` — these
are already `pub(crate)` and produce a `Child`; promote them to
`pub(super)` (or the smallest scope needed) so the `remote::`
module can call them without duplication.

For the agora-bridge spawn, write a small new helper next to the
vsock-bridge ones (say `spawn_cfs_mesh_agora_bridge`) following
the same `Child` ownership pattern (`kill_on_drop`, per-pi-process
`Drop`). The binary path is resolved via `PI_CFS_MESH_BIN` env
override → `which cfs-mesh`.

`SessionState` (already in sprites.rs) gains:
  - `host_children: Vec<tokio::process::Child>` so the daemons
    die with the provider when `cleanup()` runs.
  - `room_id_fs: String`, `room_id_broker: String` so M2 can
    inject them into the sprite-side bootstrap.
  - `run_dir: PathBuf` (a per-session tempdir under
    /home/nemesis/code/.pi-sprites/<sprite_id>/, NOT /tmp —
    /tmp is tmpfs on this box per memory feedback).

## Agora room provisioning

For v1, generate two fresh agora room IDs + symmetric keys per
session via `agora dm <self> --new-room` (or programmatic
equivalent — check the agora CLI). Store the room ID + key in
the same tempdir as the rest of the session state. M2 will pass
these into the sprite via env vars set on the contextfsd /
cfs-mesh wromm exec calls.

If agora doesn't expose a stable programmatic API for room
creation, shell out to the `agora` CLI in single-shot mode and
parse the result; document the fallback in a code comment.

## Tests this milestone owns

Three integration tests in `crates/pi-sandbox/tests/`:

  1. `sprites_host_orchestration_smoke` (Linux-only,
     network-free): mocks all four binaries (cfs-fs-server,
     contextfs-broker, cfs-mesh, agora) by writing tiny shell
     scripts to a tempdir that record their argv and sleep
     forever. Sets `PI_SANDBOX_CFS_FS_SERVER_BIN` etc. to
     point at them. Constructs a SpritesProvider, calls a
     test-only `_test_open_host_side_only()` method (you'll
     add it behind `#[cfg(test)]`). Asserts each mock was
     called with the expected argv and that all three
     children are alive after `ensure_session_open` returns.

  2. `sprites_host_orchestration_clean_kill_on_drop`: same
     mocks, then drop the provider and assert all four child
     processes are SIGKILL'd within 1s (kill_on_drop contract).

  3. `sprites_host_orchestration_missing_binary_fails_loudly`:
     unset PI_SANDBOX_CFS_FS_SERVER_BIN, ensure
     `from_auth().execute_tool()` returns
     `SandboxError::Unavailable` with a helpful message
     listing the missing binary.

NO live Sprites or live agora room in M1 — those land in M2/M3.

## Constraints

- Don't edit anything in `crates/contextfs/` or
  `/home/nemesis/code/contextfs/`. The user's standing rule:
  contextfs changes need explicit OK. Only consume contextfs
  binaries via env-resolved paths.
- /tmp is tmpfs on the dev host — do NOT put long-running
  state (UDSes, secrets, agora session files) there. Use
  `/home/nemesis/code/.pi-sprites/<sprite_id>/`.
- Keep the wromm shell-out path working for users who run
  `--sandbox-provider=sprites` without contextfs (i.e. the
  binaries aren't found). Behind a feature gate
  `PI_SPRITES_CONTEXTFS=1` (default off) until M3 dogfoods green.

Acceptance: reviewer's verdict line is `Verdict: APPROVED`
AND `cargo build -p pi-sandbox -p pi-coding-agent` is clean
AND all three tests in `cargo test -p pi-sandbox` pass.
"""

