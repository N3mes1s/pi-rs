assignment = """
M1 landed the host-side daemons. This milestone writes the
sprite-side bootstrap: upload the contextfs/agora/cfs-mesh
binaries to the sprite, install fuse3, configure + start the
daemons inside, and verify /work mounts.

Read FIRST:
  - rfd/0026-sandbox-remote.md §"v2" Phase B (sandbox bootstrap)
  - The probe findings cataloged in §6/§7 — Sprites has
    NoNewPrivs=0, sudo, /dev/fuse openable; fusermount3 is NOT
    preinstalled but apt-get install -y fuse3 works (~3s)
  - contextfs/crates/contextfsd/src/config.rs — the TOML schema
    for `[mount.remote_fs]` + `[broker]` + tenant-secret path
    expectations (mode 0600, hex-encoded 32-byte secret)
  - crates/pi-sandbox/src/remote/sprites.rs after M1 lands

## What this milestone ships

Extend `ensure_session_open` (after the M1 host-side daemons
are up) with a sprite-side bootstrap sequence:

  1. `wromm cp` the four musl-static binaries into the sprite
     under /home/sprite/pi-cfs/:
       - contextfsd
       - cfs-mesh
       - cfs-fs-server (NOT used inside sprite, but useful
         for diagnostics; optional — skip if it bloats upload)
       - agora
     Resolve binary paths via env: PI_SANDBOX_CONTEXTFSD_BIN,
     PI_SANDBOX_CFS_MESH_BIN, PI_SANDBOX_AGORA_BIN. Default to
     the musl-static `target/x86_64-unknown-linux-musl/release/`
     paths if unset. Total upload ≈ 27 MB.

  2. Run `sudo apt-get install -y fuse3` inside the sprite via
     `wromm exec`. This is idempotent so re-running is fine.
     Time: ~3s.

  3. Generate a contextfsd config TOML on the host (writeable
     to a per-session host tempdir), then `wromm cp` it into
     the sprite at /home/sprite/pi-cfs/contextfsd.toml:
       - tenant_secret_path = "/home/sprite/pi-cfs/tenant.secret"
       - audit_log_path = "/home/sprite/pi-cfs/audit.log"
       - [pdp].policy_path = "/home/sprite/pi-cfs/policy.cedar"
       - [[mount]].name = "work"
       - [[mount]].mountpoint = "/work"
       - [[mount]].backend = "remote-fs"
       - [[mount]].cache_dir = "/home/sprite/pi-cfs/cache"
       - [[mount]].read_only = false
       - [mount.remote_fs].target_uds = "/run/cfs/fs.sock"
       - [broker].socket_path = "/run/cfs/broker.sock"
     Generate fresh tenant.secret + policy.cedar on the host,
     `wromm cp` them in (chmod 0600 happens via wromm exec
     since cp may not preserve mode).

  4. Start the sprite-side daemons. Each via `wromm exec` with
     proper detachment (`setsid`, redirect stdin/out/err to
     files in /home/sprite/pi-cfs/logs/, `&` + `disown`):
       a. `agora` joining rooms <room_id_fs> + <room_id_broker>
          using the keys M1 generated. Daemonised; logs to
          agora.log.
       b. `cfs-mesh agora-listen --room <room_id_fs>
              --uds /run/cfs/fs.sock`
       c. `cfs-mesh agora-listen --room <room_id_broker>
              --uds /run/cfs/broker.sock`
       d. `contextfsd --config /home/sprite/pi-cfs/contextfsd.toml`

  5. Wait until `/work` is FUSE-mounted in the sprite. Poll
     `mount | grep /work` via `wromm exec` with a 30s budget;
     fail loudly if not mounted (and surface contextfsd.log
     for debug).

  6. Update the worker invocation in `dispatch_tool` to use
     `--work-dir /work` (currently `/home/sprite`). The worker
     binary itself stays at /home/sprite/pi-sandbox-worker
     since it's already chmod'd in M1's wromm cp path.

## Tests this milestone owns

  1. `sprites_sandbox_bootstrap_smoke` (Linux-only, gated on
     SPRITES_TOKEN + ALL FOUR binary env vars being set):
     creates a real sprite via wromm, runs the full
     ensure_session_open(), asserts /work is mounted via a
     `wromm exec ls /work` round-trip, then runs cleanup().
     One sprite, one assertion. Wall-clock budget: 90s
     (provision + apt-get + binary uploads + bootstrap).

  2. `sprites_sandbox_bootstrap_skip_when_no_token`: with
     SPRITES_TOKEN unset, the test prints SKIP and returns Ok.

NO multi-sprite or stress in M2 — those are M3.

## Constraints

- Use `setsid` + explicit `< /dev/null > log 2>&1 &` + `disown`
  for sprite-side daemon launches. nohup alone hangs `wromm
  exec` (verified during the manual probe loop).
- Per-session host tempdir for tenant.secret + policy.cedar
  + agora session files. Clean up on `cleanup()` (the same
  Drop path that kills host-side children).
- Don't bake any sprite-internal paths into the pi-sandbox
  crate's public API — they're implementation details.

Acceptance: reviewer APPROVED + workspace builds + the two
tests pass (smoke green when SPRITES_TOKEN set; skip otherwise).
"""

