# RFD 0026 v2 — wire contextfs + agora into the Sprites remote sandbox.
#
# Successor to rfd-0026-implement-e2b-campaign.toml. The E2B path
# is on main as commit ccc2675 + envd-route fix 6a0a7e8. The
# Sprites path now has its skeleton on main as commit 9ed9e45
# (SpritesProvider via wromm shell-out, no /work mount yet).
#
# This campaign lights up bidirectional real-time host↔sandbox
# /work via contextfs + cfs-mesh agora-listen + agora, replacing
# wromm's default project-sync at session-open.
#
# Architecture (RFD 0026 v2 §"Architecture"):
#
#   HOST (per pi session):
#     - cfs-fs-server  (UDS, root=cwd, RW)
#     - contextfs-broker (UDS, Cedar policy gate)
#     - cfs-mesh agora-bridge --room=<X> --target-uds=<cfs-fs UDS>
#     - cfs-mesh agora-bridge --room=<Y> --target-uds=<broker UDS>
#     - agora client joined to rooms X+Y
#
#   SPRITE (after wromm up):
#     - musl-static contextfsd / cfs-mesh / agora binaries uploaded
#     - apt-get install -y fuse3 (required, ~3s)
#     - agora client joined to rooms X+Y
#     - cfs-mesh agora-listen --room=<X> --uds=/run/cfs/fs.sock
#     - cfs-mesh agora-listen --room=<Y> --uds=/run/cfs/broker.sock
#     - contextfsd --config <toml> with [mount.remote_fs]
#       target_uds=/run/cfs/fs.sock, [broker] socket_path=/run/cfs/broker.sock
#     - contextfsd FUSE-mounts /work
#
#   WORKER (in sprite):
#     - pi-sandbox-worker --work-dir /work
#     - All filesystem ops flow through contextfsd → agora room → host
#
# Prereqs (campaign verifies + fails loudly if absent):
#   - main has commits 9ed9e45 (Sprites skeleton) + 640a3f0 (RFD v2)
#   - SPRITES_TOKEN env var or pi auth storage
#   - musl-static contextfsd / cfs-mesh / cfs-fs-server / contextfs-broker
#     under /home/nemesis/code/contextfs/target/x86_64-unknown-linux-musl/
#   - musl-static agora under /home/nemesis/code/agora/target/x86_64-unknown-linux-musl/
#   - musl-static pi-sandbox-worker under PI_SANDBOX_WORKER_BIN
#   - wromm CLI on PATH (or PI_WROMM_BIN)
#   - Network from host to api.sprites.dev + agora's broker
#
# Run:
#   pi --orchestrate rfd-0026-sprites-contextfs-campaign.toml \
#      --auto-approve auto-judge --route auto

name = "rfd-0026-sprites-contextfs"
description = """
Wire contextfs + cfs-mesh + agora into the Sprites remote sandbox
provider so /work is a real-time bidirectional FUSE mount instead
of wromm's project-sync-at-open. Three milestones:
  M1 — host-side orchestration (spawn cfs-fs-server, broker,
       cfs-mesh agora-bridge; provision agora room + key).
  M2 — sprite-side bootstrap (upload binaries, install fuse3,
       start agora + cfs-mesh + contextfsd inside the sprite).
  M3 — real e2e dogfood: pi solves a coding task through
       --sandbox-provider=sprites with bidirectional /work; verify
       host-side edit during a tool call propagates to the sprite
       on the next read.

Acceptance: scripts/dogfood-sprites-contextfs.sh runs end-to-end
green AND a 100-MB stress test (10 files × 10 MB) round-trips
without error AND host-edit-during-tool-call visibility test passes.
"""

target_branch = "rfd-0026-sprites-contextfs-target"

[defaults]
fix_loop_max = 15
push_retry_max = 0
reviewer = "gpt5-code-reviewer"

