  - rfd/0026-sandbox-remote.md §"v2" §"Acceptance criteria"

## What ships

A scripted reproducible demo at
`scripts/dogfood-sprites-contextfs.sh` that:

  1. Stages a small toy Rust source tree in a tempdir
     (matches the E2B dogfood: src/math.rs with a buggy
     abs_diff + an empty tests/).

  2. Runs `pi -p --sandbox-provider=sprites
        --auto-approve=yolo --json` with a self-contained
     brief: "read src/math.rs, identify the bug, write a
     test in tests/bug_test.rs that catches it; before
     writing the test, run hostname (the sandbox's id should
     differ from kusanagi); after writing, sleep 3 then
     re-read tests/bug_test.rs to confirm it persists".

  3. While the agent is running (specifically: at the
     'sleep 3' window inside the brief), the script edits
     src/math.rs from the HOST, appending a comment line
     `// host-edit-marker-<timestamp>`.

  4. After pi exits, asserts:
       a. The agent's hostname call output matches a sprite
          (not 'kusanagi'). Same proof shape as E2B dogfood.
       b. tests/bug_test.rs exists on the host and references
          abs_diff.
       c. The host-edit-marker comment is present in the
          sandbox's view of /work/src/math.rs (proven by a
          wromm exec cat at the end of the script). This is
          the bidirectional-liveness gate that contextfs+agora
          delivers and that wromm's project-sync-at-open
          can't.

  4. (separate `--stress` flag): write 10 files × 10 MB of
     random bytes from inside the sprite, then read each one
     back from the host and assert the SHA256 matches. 100 MB
     round-trip stress, mirrors the RFD's "Acceptance criteria"
     bullet 2.

## Documentation

Update RFD 0026 v2:
  - Mark §"Acceptance criteria" bullets 1 and 2 as DONE with a
    link to the dogfood script + the iteration this campaign
    landed.
  - Append an "Operating notes" subsection with: how to set
    up the env (PI_SANDBOX_CONTEXTFSD_BIN, PI_SANDBOX_CFS_MESH_BIN,
    PI_SANDBOX_AGORA_BIN), how to run the dogfood, what
    wall-time the script measured, and any failure modes the
    M3 work surfaced (likely: the agora room cold-start adds
    ~Ns to session-open vs wromm-only; document the number).

## Hard constraints

- Script must NOT commit the demo's tempdir to the repo —
  side-effect-free repro.
- Skip cleanly if SPRITES_TOKEN unset.
- Tear down its sprite + host-side daemons + agora session
  on exit (trap-based cleanup); never leave orphaned state.
- The host-edit-during-tool-call check MUST fail if
  PI_SPRITES_CONTEXTFS is unset (i.e. wromm-only mode shouldn't
  pass this gate). That's how we prove contextfs is the thing
  delivering the property.
- Wall-clock target: < 3 minutes for the basic demo,
  < 5 minutes with --stress.

Acceptance: dogfood script passes all three verifications
green AND --stress passes all 10 SHA matches AND reviewer's
verdict is APPROVED.
"""
