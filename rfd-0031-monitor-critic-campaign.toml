# RFD 0031 — `monitor` streaming protocol: rfd-critic iteration loop.
#
# Sister campaign to rfd-0030-lsp-critic-campaign.toml. Drives
# RFD 0031 to a READY verdict from the rfd-critic agent. Same
# iteration pattern as RFD 0023 (35+ revisions before READY).
#
# Run:
#   pi --orchestrate rfd-0031-monitor-critic-campaign.toml \
#      --auto-approve auto-judge --route auto

name = "rfd-0031-monitor-critic-loop"
description = """
Iterate RFD 0031 (`monitor` streaming protocol for sandboxed
providers) to a READY verdict from rfd-critic. The RFD extends
pi-sandbox-protocol with a `WorkerFrame` enum carrying
`MonitorStarted`/`MonitorLines`/`MonitorEnded` frames over the
existing per-call vsock connection, version-bumps to proto v2,
and reuses the host's existing MonitorSender pump.

Acceptance: rfd-critic emits `Verdict: READY` with no critical
issues. Underspec / overengineered / missing notes are
fold-in-able by the polish pass.
"""

target_branch = "rfd-0031-monitor-critic"

[defaults]
fix_loop_max = 30
push_retry_max = 0
reviewer = "rfd-critic"

# ─────────────────────────────────────────────────────────────────
# M1 — Iterate RFD 0031 to READY
# ─────────────────────────────────────────────────────────────────
[[milestones]]
id = "iterate-to-ready"
branch = "rfd-0031-monitor-iter"
implementer = "halo-implementer"   # opus-4.7 1M
reviewer    = "rfd-critic"          # gpt-5.4 xhigh
fix_loop_max = 30

assignment = """
You are revising RFD 0031 — `monitor` streaming protocol for
sandboxed providers. Path: `rfd/0031-monitor-streaming-protocol.md`.

## Loop shape

Each turn:

1. Read `rfd/0031-monitor-streaming-protocol.md` end-to-end.
2. Read the most recent rfd-critic verdict (previous review;
   first turn has no prior verdict).
3. Apply concrete deltas: close every **Critical**, fix every
   actionable **Underspecified**, cut every **Overengineered**,
   add every **Missing**.
4. Bump the version line in §"Revision history" with a
   one-line summary of changes this turn.
5. Commit on `rfd-0031-monitor-iter` with message
   `rfd: 0031 v0.N — <delta summary>`.
6. Hand off to rfd-critic.

## Anchor primitives the critic will hammer

- RFD 0017 (monitor tool, its volume cap / concurrency cap /
  duration cap semantics).
- RFD 0023 §"Wire protocol" (existing newline-JSON framing,
  proto_version negotiation, frame-size cap).
- The actual `WorkerFrame` shape: critic will demand the
  serde tag layout, the back-compat story for old workers, the
  exact bytes-on-the-wire example for an end-to-end
  `monitor.start` → `Lines` × N → `Ended` → `Response` flow.
- Per-call hygiene interaction (RFD 0023 §"Post-call hygiene")
  — what happens to the monitor child between calls when its
  parent worker is the same VM? Document the resolution.
- `PI_SANDBOX_FC_MAX_CALLS=1` interaction — monitor dies with VM,
  synthetic Ended frame to the host.

## Hard constraints

- **Wire-format breaking changes need explicit version-bump
  semantics.** v1 readers don't understand v2 frames; document
  the rejection path. Don't paper over with "best effort".
- **Don't grow `WorkerFrame` cases beyond what `monitor` needs.**
  Every new variant is forever; future tools that want streaming
  open their own RFD.
- **Threat model deltas need concrete examples.** "DoS via
  notification flood" earns one, "child-process escape via
  shared overlay" earns one, "back-pressure when MonitorSender
  fills" earns one.
- **Verify all citations.** RFD 0017 §X lines vs the live file;
  RFD 0023 §"X" headings; pi-sandbox-protocol crate's actual
  current `pub` surface.

## Termination

Reviewer is rfd-critic; verdict line is `Verdict: READY` or
`Verdict: NEEDS_REVISION`.

When `Verdict: READY` appears, milestone is DONE. Push the
branch, emit `TURN_COMPLETE`. Do NOT iterate past READY.

If `fix_loop_max` (30) hits without READY, fail with a summary of
the last verdict.
"""
