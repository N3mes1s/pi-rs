[build]
target = "x86_64-unknown-linux-musl"

# Use the system `git` CLI to fetch crates instead of cargo's
# bundled libgit2. Required for git-pinned deps (contextfsd is
# fetched from a private/auth'd GitHub repo); libgit2 doesn't
# pick up the user's credential helper so the fetch fails with
# "could not read from remote repository". The CLI inherits
# whatever auth method the user already has configured.
[net]
git-fetch-with-cli = true

# Static relocation model + post-link `.eh_frame` strip.
#
# Because the binary is statically linked against musl AND we use
# `panic = "abort"`, we don't need:
#   * PIE/dyn-relocation tables (`relocation-model=static` removes
#     `.rela.dyn` ≈ 312 KiB)
#   * `.eh_frame` / `.eh_frame_hdr` / `.gcc_except_table` (≈ 510 KiB)
#     They exist only to support unwinding on panic, which we abort on.
#     `cargo` itself can't strip these sections; do it post-link.
#
# Total saving: ~890 KiB (5159 → 4261 KiB), plus ~80 µs cold-start
# from skipping the dynamic-reloc apply pass at `_start`.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "relocation-model=static"]

