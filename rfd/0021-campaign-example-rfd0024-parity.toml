# Campaign TOML example: replays today's RFD 0024 parity-sweep
# workflow as a `pi --orchestrate` campaign. Validation target —
# what an executor would need to consume.
#
# Today's actual workflow:
#   1. parity-pi (Feature 1: Tab/Shift-Tab/Right autocomplete)
#   2. reviewer-pi on commit 46bf9ad
#   3. usage-validator-pi (real tmux smoke)
#   4. parity-feat2to5-pi (Features 2-5)
#
# Run: target/x86_64-unknown-linux-musl/debug/pi --orchestrate-dry-run \
#         rfd/0021-campaign-example-rfd0024-parity.toml

name = "rfd0024-parity-sweep"
description = """
Land the five remaining TUI parity items vs ~/code/oh-my-pi as
RFD 0024 follow-ups. Each feature ships its own milestone with the
implementer → reviewer → usage-validator pattern.
"""
target_branch = "claude/dogfood-rfd0024-hard-mode-parity-sweep"

[defaults]
reviewer = "code-reviewer"
fix_loop_max = 2
push_retry_max = 3

# ─────────────────────────────────────────────────────────────────
# M1 — Slash autocomplete acceptance (Tab / Shift-Tab / Right)
# ─────────────────────────────────────────────────────────────────
[[milestones]]
id = "feat1-autocomplete"
branch = "claude/parity-feat1-autocomplete"
depends_on = []
implementer = "router-implementer"  # gpt-5.4 thinking xhigh
reviewer = "code-reviewer"
fix_loop_max = 2

assignment = """
Add Tab / Shift-Tab / Right slash-command autocomplete acceptance
to the pi TUI. State machine on View:
  slash_ac_cycle_suggestions, slash_ac_cycle_index,
  slash_ac_accepted_range, slash_ac_hidden_until_char.

Tests in tests/slash_autocomplete.rs:
  tab_accepts_top_suggestion (Tab → "/help " trailing space),
  tab_cycles_and_shift_tab_cycles_backwards,
  right_at_end_of_line_accepts_top_suggestion.

Bail out early in handle_key BEFORE cursor-edit arms; clear state
on Backspace/Delete/cursor-jump. Spec: oh-my-pi muscle memory.

Termination: TURN_COMPLETE only after `cargo build --workspace`
and `cargo test -p pi-coding-agent --test slash_autocomplete`
both green.
"""

# ─────────────────────────────────────────────────────────────────
# M2 — Powerline footer
# ─────────────────────────────────────────────────────────────────
[[milestones]]
id = "feat2-powerline-footer"
branch = "claude/parity-feat2-powerline"
depends_on = ["feat1-autocomplete"]
implementer = "router-implementer"

assignment = """
Replace the existing dim ▶-separated footer line with a powerline-
style segmented bar. ≥5 distinct background colours, one per
segment: model name / cwd basename / git branch / route mode /
total cost. Use the existing theme palette (no hard-coded RGB).

Degrade gracefully on terminals without 256-colour support
(probe via crossterm::style::available_color_count or fallback
heuristic; fall back to the existing dim line).

Test: footer_powerline_has_distinct_coloured_segments_when_256_-
colours_available — assert ≥5 spans with distinct fg+bg pairs.
"""

# Per-milestone reviewer override would go here if we had a
# graphics-aware reviewer; for now use the default.

# ─────────────────────────────────────────────────────────────────
# M3 — Paragraph re-wrap regression fix
# ─────────────────────────────────────────────────────────────────
[[milestones]]
id = "feat3-paragraph-rewrap"
branch = "claude/parity-feat3-rewrap"
depends_on = ["feat1-autocomplete"]
implementer = "router-implementer"

assignment = """
Fix the long-line overflow regression introduced by ca77616 (the
markdown space-eating fix). Add a single textwrap pass over the
assembled spans at Event::End(Tag::Paragraph) that wraps at word
boundaries WITHOUT eating boundary spaces between adjacent styled
spans.

Use textwrap with WordSplitter::HyphenSplitter and a custom
char-counter that respects ANSI-coloured boundaries. Guard rails:
  - no line >80 cols on a 200-word paragraph
  - search the joined output for "Amonad" / "andand_then" — the
    bug strings — must not appear (boundary spaces preserved).
"""

# Override rule example: if reviewer flags textwrap-version
# concerns as part of this milestone's review, drop them as
# in-scope-but-don't-block (no `forward_to` needed for in-scope).
[[milestones.override_rules]]
match = "textwrap.*version|bump.*textwrap"
verdict = "in-scope"

# ─────────────────────────────────────────────────────────────────
# M4 — Markdown headings, lists, blockquotes
# ─────────────────────────────────────────────────────────────────
[[milestones]]
id = "feat4-markdown-blocks"
branch = "claude/parity-feat4-mdblocks"
depends_on = ["feat3-paragraph-rewrap"]
implementer = "router-implementer"
fix_loop_max = 3  # markdown formatting tends to need more iterations

assignment = """
Add pulldown-cmark handlers for Tag::Heading (H1-H6 with `#…######`
prefix and bold-accent colour), Tag::List (unordered → "• ",
ordered → "N. ", 2-space-per-level nested indent), and
Tag::BlockQuote (each line prefixed with "▌ " in muted colour).

Test: render `## hello\\n- one\\n- two\\n> quote`; assert prefixes
appear and nested lists indent correctly.
"""

# ─────────────────────────────────────────────────────────────────
# M5 — Live SlashRegistry plumbing
# ─────────────────────────────────────────────────────────────────
[[milestones]]
id = "feat5-live-slash-registry"
branch = "claude/parity-feat5-slash-registry"
depends_on = ["feat1-autocomplete"]
implementer = "router-implementer"

assignment = """
slash_command_suggestions_for currently calls SlashRegistry::new()
per call, omitting any extension/template commands. Wire a live
registry into the autocomplete path.

Approach: store an Arc<SlashRegistry> on View (or a clone — the
registry is small), populate it in build_session from
startup.slash_registry, have slash_command_suggestions_for read
view.slash_registry instead of SlashRegistry::new().

The previous attempt (commit 46bf9ad rollback) left a dangling
view.slash_registry reference — the field MUST exist on View
before any code references it. Test: register a custom command,
call the suggestions helper through the View, assert the custom
command appears.
"""

# ─────────────────────────────────────────────────────────────────
# Notes for the executor:
#
# Today's manual run also dispatched a "usage-validator" pi for
# real-tmux smoke testing of M1. The schema as of v1.3 has no
# slot for that role. Either:
#   (a) define a `usage-validator` subagent under `.pi/agents/`
#       and add a third role to the milestone schema, OR
#   (b) inline tmux smoke as part of the implementer's TURN_-
#       COMPLETE criteria (which is what M1's assignment already
#       implies via the `cargo test … green` rule).
#
# (b) is the lighter touch. (a) is the principled answer if you
# expect non-test usage validation to be common (visual checks,
# user-flow walks).
