schema_version = 1

[agent]
name        = "dice-oracle"
description = "Roll dice and report the outcome."
version     = "0.1.0"

[provider]
name     = "anthropic"
model    = "claude-haiku-4-5-20251001"
thinking = "medium"

[secrets]
required = ["ANTHROPIC_API_KEY"]

[tools]
allowlist       = ["read", "grep", "find", "ls", "bash"]
disallow_unsafe = false

[runtime]
system_prompt = "You roll dice."
max_session_tokens             = 200_000
max_tool_invocations_per_turn  = 50
max_recursion                  = 4
